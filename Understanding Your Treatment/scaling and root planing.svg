<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0b1f2e" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="650" rx="28" fill="url(#bg)"/>

  <text x="70" y="105" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#0b4c6c">
    Scaling &amp; Root Planing
  </text>
  <text x="70" y="150" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="600" fill="#00b4a6" letter-spacing="2">
    DEEP CLEANING FOR GUM HEALTH
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="190" width="520" height="390" rx="22" fill="#ffffff"/>
    <rect x="610" y="190" width="520" height="390" rx="22" fill="#ffffff"/>
  </g>

  <!-- Left card: Scaling -->
  <text x="110" y="250" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0b1f2e">
    Scaling
  </text>
  <text x="110" y="282" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#4a5568">
    Removes plaque &amp; tartar above the gumline
  </text>

  <!-- Tooth + gum simplified -->
  <g transform="translate(110,315)">
    <rect x="0" y="160" width="420" height="14" rx="7" fill="#cbd5e1"/>
    <path d="M40,40 C40,10 80,0 110,0 C140,0 180,10 180,40 C180,72 160,92 160,126 C160,156 145,190 110,190 C75,190 60,156 60,126 C60,92 40,72 40,40 Z"
          fill="#ffffff" stroke="#0b4c6c" stroke-width="6"/>
    <path d="M10,110 C60,85 140,85 210,110 C270,132 325,138 400,126 L400,160 C315,178 260,170 200,150 C130,124 70,124 10,150 Z"
          fill="#ffd1d6" stroke="#ef4444" stroke-opacity="0.35" stroke-width="2"/>
    <!-- tartar dots above gumline -->
    <g fill="#f59e0b">
      <circle cx="75" cy="96" r="8"/>
      <circle cx="110" cy="90" r="8"/>
      <circle cx="145" cy="96" r="8"/>
    </g>
    <!-- scaler tool -->
    <path d="M260,40 L390,10" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M390,10 L405,35" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M405,35 L350,70" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M350,70 L330,90" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Right card: Root planing -->
  <text x="650" y="250" font-family="Plus Jakarta Sans, Inter, system-ui, sans-serif" font-size="28" font-weight="800" fill="#0b1f2e">
    Root Planing
  </text>
  <text x="650" y="282" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#4a5568">
    Smooths root surface below the gumline to help gums reattach
  </text>

  <g transform="translate(650,315)">
    <rect x="0" y="160" width="420" height="14" rx="7" fill="#cbd5e1"/>
    <path d="M40,40 C40,10 80,0 110,0 C140,0 180,10 180,40 C180,72 160,92 160,126 C160,156 145,190 110,190 C75,190 60,156 60,126 C60,92 40,72 40,40 Z"
          fill="#ffffff" stroke="#0b4c6c" stroke-width="6"/>
    <path d="M10,110 C60,85 140,85 210,110 C270,132 325,138 400,126 L400,160 C315,178 260,170 200,150 C130,124 70,124 10,150 Z"
          fill="#ffd1d6" stroke="#ef4444" stroke-opacity="0.35" stroke-width="2"/>
    <!-- tartar dots below gumline -->
    <g fill="#f59e0b">
      <circle cx="92" cy="134" r="8"/>
      <circle cx="120" cy="142" r="8"/>
      <circle cx="148" cy="134" r="8"/>
    </g>
    <!-- curette tool -->
    <path d="M260,35 L390,20" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M390,20 L405,48" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M405,48 L330,120" stroke="#00b4a6" stroke-width="10" stroke-linecap="round"/>
    <path d="M330,120 Q310,140 300,160" stroke="#00b4a6" stroke-width="10" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Footer note -->
  <g>
    <rect x="70" y="595" width="1060" height="40" rx="20" fill="rgba(0,180,166,0.12)"/>
    <text x="95" y="622" font-family="Inter, system-ui, sans-serif" font-size="16" fill="#0b4c6c">
      Tip: Deep cleaning is often done with local anaesthesia and may be split into 2 visits depending on gum pocket depth.
    </text>
  </g>
</svg>

